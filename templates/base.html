<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Input Laporan Jam Pertama Al Quran</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <style>
        body { background-color: #f8f9fa; }
        .no-print { margin-bottom: 20px; }
        @media print { .no-print { display: none !important; } }
        .navbar-brand { font-size: 1.1rem; line-height: 1.2; }
    </style>
</head>
<body>
    <nav class="navbar navbar-dark bg-dark mb-4 no-print">
        <div class="container">
            <a class="navbar-brand fw-bold text-wrap" href="/" style="max-width: 250px;">
                INPUT LAPORAN JAM PERTAMA AL QURAN
            </a>
            <div class="d-flex align-items-center">
                <a href="https://docs.google.com/spreadsheets/d/1gKsf0NS1MkEC5-GtN4eRFhDqWLYEaGFMhAkfEYJ8Fvc/edit?usp=sharing" 
                   target="_blank" class="btn btn-success btn-sm me-3">
                    <i class="bi bi-file-earmark-spreadsheet"></i> Rekap Utama
                </a>
                <span class="navbar-text me-3 text-white small d-none d-md-inline">Ustaz: <strong>{{ user.username }}</strong></span>
                <form method="post" action="{% url 'logout' %}" style="display:inline;">
                    {% csrf_token %}
                    <button type="submit" class="btn btn-outline-light btn-sm">Keluar</button>
                </form>
            </div>
        </div>
    </nav>
    <div class="container">
        {% block content %}{% endblock %}
    </div>
<footer class="text-center py-3 no-print" style="font-size: 0.8rem; color: #6c757d;"> </footer> </body>
</html>
